<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    header {
      background: #1c1c1c;
      color: #fff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #online {
      font-size: 12px;
      color: #9cff9c;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .dark .other {
      background: #2a2a2a;
      border-color: #444;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
    }

    .tick {
      font-size: 11px;
      position: absolute;
      bottom: 4px;
      right: 6px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputBox {
      display: flex;
      padding: 8px;
      background: #1c1c1c;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }
