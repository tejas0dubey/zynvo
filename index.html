<!DOCTYPE html>
<html>
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5319494706493676"
     crossorigin="anonymous"></script>
  <title>Zynvo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<STYLE>
 /* 🌈 GLOBAL SOFT GLOW */
body {
  background: radial-gradient(circle at top, #fff7e6, #fdf6ec);
}

/* ✨ HEADER GLOW */
header {
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

/* 💬 MESSAGE ANIMATION */
.msg {
  animation: msgIn 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.msg:hover {
  transform: scale(1.02);
}

/* 🟢 YOUR MESSAGE GLOW */
.me {
  box-shadow: 0 0 10px rgba(37, 211, 102, 0.4);
}

/* ⚪ OTHER MESSAGE SOFT LIGHT */
.other {
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

/* 🚀 INPUT BOX LIGHT */
#inputBox {
  box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
}

/* ✨ INPUT FIELD EFFECT */
input {
  transition: 0.2s;
}

input:focus {
  box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
}

/* 🔘 BUTTON GLOW + PRESS */
button {
  transition: 0.2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 12px rgba(37, 211, 102, 0.7);
}

button:active {
  transform: scale(0.95);
}

/* 🖼️ IMAGE POP EFFECT */
img {
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
}

/* 🌊 MESSAGE ENTRY */
@keyframes msgIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* 💡 FLOATING LIGHT EFFECT */
body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: rgba(255, 255, 200, 0.2);
  filter: blur(80px);
  top: -50px;
  left: -50px;
  animation: floatLight 6s infinite alternate;
}

@keyframes floatLight {
  from { transform: translate(0,0); }
  to { transform: translate(50px, 50px); }
}
</STYLE>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 0 online</div>
  <div onclick="toggleMenu()" style="cursor:pointer;">⋮</div>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickImage()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <!-- ✅ UPDATED -->
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat",
  storageBucket: "anantdhamchat.firebasestorage.app",
  messagingSenderId: "543392456660",
  appId: "1:543392456660:web:c95fcddcd6ee603ea04041"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const onlineDiv = document.getElementById("online");

// USER
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// MENU
window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

window.changeName = () => {
  localStorage.removeItem("username");
  location.reload();
};

// CLEAR CHAT
window.clearChat = async () => {
  const confirmClear = confirm("Clear chat for everyone?");
  if (!confirmClear) return;

  const snapshot = await getDocs(collection(db, "messages"));

  snapshot.forEach(async (docSnap) => {
    await deleteDoc(doc(db, "messages", docSnap.id));
  });
};

// ONLINE SYSTEM
setInterval(()=>{
  setDoc(doc(db,"users",username),{
    name: username,
    lastSeen: Date.now()
  });
},3000);

onSnapshot(collection(db,"users"), snap=>{
  let count = 0;
  snap.forEach(d=>{
    const u = d.data();
    if(Date.now() - u.lastSeen < 5000) count++;
  });
  onlineDiv.innerText = "🟢 " + count + " online";
});

setInterval(async () => {
  await setDoc(doc(db, "users", username), {
    name: username,
    lastSeen: Date.now()
  });
}, 2000);

onSnapshot(collection(db, "users"), snap => {
  let count = 0;
  const now = Date.now();

  snap.forEach(d => {
    const u = d.data();
    if (u.lastSeen && (now - u.lastSeen < 7000)) count++;
  });

  onlineDiv.innerText = "🟢 " + count + " online";
});

// FILE (IMAGE + PDF)
window.pickImage = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async () => {

    if (file.type === "application/pdf") {
      await addDoc(collection(db, "messages"), {
        pdf: reader.result,
        fileName: file.name,
        user: username,
        time: Date.now(),
        seen: false
      });
    } else {
      await addDoc(collection(db, "messages"), {
        image: reader.result,
        user: username,
        time: Date.now(),
        seen: false
      });
    }

  };

  reader.readAsDataURL(file);
};

// TEXT
window.sendMsg = async () => {
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: username,
    time: Date.now(),
    seen: false
  });

  input.value = "";
};

// LOAD
const q = query(collection(db,"messages"), orderBy("time"), limit(50));

onSnapshot(q, snapshot => {
  chat.innerHTML = "";

  snapshot.forEach(async docSnap => {
    const msg = docSnap.data();
    const id = docSnap.id;

    if(msg.user !== username && !msg.seen){
      setDoc(doc(db,"messages",id),{ seen:true }, { merge:true });
    }

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "other");

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.text) html += `<div>${msg.text}</div>`;
    if (msg.image) html += `<img src="${msg.image}">`;

    // ✅ PDF DISPLAY
    if (msg.pdf) {
      html += `
        <div style="margin-top:5px;">
          📄 <a href="${msg.pdf}" target="_blank">
            ${msg.fileName || "Open PDF"}
          </a>
        </div>
      `;
    }

    html += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;

    if(msg.user === username){
      html += `<div class="tick">${msg.seen ? "✔✔" : "✔"}</div>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// ENTER
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
  
</script>

</body>
</html>
