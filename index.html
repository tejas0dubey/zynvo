<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>

  <link rel="icon" type="image/png" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: hsl(35, 17%, 46%);
      color: #fff;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 85%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 14px;
      font-size: 18px;
      word-break: break-word;
    }

    .me { background: #e6f7c7; align-self: flex-end; }
    .other { background: #fff; border: 1px solid #ddd; }

    .meta {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 5px;
    }

    #inputBox {
      display: flex;
      padding: 14px;
      background: #1c1c1c;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      outline: none;
    }

    button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #d8b36a;
      color: white;
      font-size: 18px;
    }

    img, video {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 6px;
    }

    #namePopup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #namePopup div {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

  </style>
</head>

<body>

<header>
  <div style="display:flex;gap:10px;align-items:center;">
    <img src="icon.png" style="width:40px;height:40px;border-radius:8px;">
    <span>Zynvo</span>
  </div>
</header>

<div id="namePopup">
  <div>
    <h2>Enter Name</h2>
    <input id="nameInput">
    <br><br>
    <button onclick="setName()">Join</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="openMenu()">+</button>
  <input id="msgInput" placeholder="Message..." />
  <button onclick="sendMsg()">➤</button>
</div>

<input type="file" id="imgInput" style="display:none;">
<video id="camera" autoplay style="display:none;"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getDatabase, ref, set, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyClB...",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = getFirestore(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const imgInput = document.getElementById("imgInput");
const camera = document.getElementById("camera");

let room = localStorage.getItem("room") || prompt("Room:");
let username = localStorage.getItem("username");

if (username) document.getElementById("namePopup").style.display="none";

/* NAME */
window.setName = async () => {
  username = document.getElementById("nameInput").value;
  localStorage.setItem("username", username);
  document.getElementById("namePopup").style.display="none";

  await addDoc(collection(db,"messages"),{
    system:true,
    text: username+" joined",
    time:Date.now(),
    room
  });
};

/* SEND TEXT */
window.sendMsg = async () => {
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db,"messages"),{
    text,
    user: username,
    time: Date.now(),
    room,
    expiresAt: 0
  });

  input.value="";
};

/* IMAGE */
imgInput.onchange = () => {
  const file = imgInput.files[0];
  const reader = new FileReader();

  reader.onload = async () => {
    await addDoc(collection(db,"messages"),{
      image: reader.result,
      user: username,
      time: Date.now(),
      room,
      expiresAt: 0
    });
  };

  reader.readAsDataURL(file);
};

/* MENU */
window.openMenu = () => imgInput.click();

/* RENDER FIXED */
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q, snap => {
  chat.innerHTML="";

  snap.forEach(doc => {
    const msg = doc.data();
    if (!msg || msg.room !== room) return;

    const div = document.createElement("div");

    if (msg.system) {
      div.innerText = msg.text;
      div.style.textAlign="center";
      chat.appendChild(div);
      return;
    }

    div.className = "msg " + (msg.user === username ? "me" : "other");

    let html = `<b>${msg.user}</b><br>`;

    if (msg.text) html += msg.text;

    if (msg.image) html += `<br><img src="${msg.image}">`;
    if (msg.video) html += `<br><video controls src="${msg.video}"></video>`;
    if (msg.audio) html += `<br><audio controls src="${msg.audio}"></audio>`;

    html += `<div class="meta">${new Date(msg.time).toLocaleTimeString()}</div>`;

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
