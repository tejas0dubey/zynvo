<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Advanced Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .system {
      align-self: center;
      background: #2a3942;
      font-size: 12px;
      opacity: 0.8;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    .ticks {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 11px;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
      cursor: pointer;
    }

    #replyBox {
      display:none;
      padding:6px;
      background:#1f2c34;
      font-size:12px;
    }
  </style>
</head>

<body>

<header>Zynvo Group Chat</header>

<div id="chat"></div>
<div id="replyBox"></div>

<div id="inputBox">
  <button onclick="startVoice()">🎤</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const replyBox = document.getElementById("replyBox");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter name:");
  localStorage.setItem("username", username);

  db.collection("messages").add({
    type: "system",
    text: username + " joined the chat",
    time: Date.now()
  });
}

/* REPLY SYSTEM */
let replyTo = null;
window.setReply = (text, id) => {
  replyTo = {text, id};
  replyBox.style.display = "block";
  replyBox.innerText = "Replying to: " + text;
};

/* SEND */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    time: Date.now(),
    reply: replyTo,
    seenBy: [username]
  });

  input.value = "";
  replyTo = null;
  replyBox.style.display = "none";
}

/* DELETE */
window.deleteMsg = (id) => {
  db.collection("messages").doc(id).delete();
};

/* VOICE MESSAGE */
function startVoice() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      const recorder = new MediaRecorder(stream);
      let chunks = [];

      recorder.ondataavailable = e => chunks.push(e.data);

      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        const reader = new FileReader();

        reader.onload = () => {
          db.collection("messages").add({
            type: "voice",
            audio: reader.result,
            user: username,
            time: Date.now(),
            seenBy: [username]
          });
        };

        reader.readAsDataURL(blob);
      };

      recorder.start();
      setTimeout(() => recorder.stop(), 4000);
    });
}

/* LOAD CHAT */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();
    const id = doc.id;

    const div = document.createElement("div");

    if (msg.type === "system") {
      div.className = "msg system";
      div.innerText = msg.text;
      chat.appendChild(div);
      return;
    }

    div.className = "msg " + (msg.user === username ? "me" : "");

    let ticks = msg.seenBy?.length > 1 ? "✔✔" : "✔";

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.reply) {
      html += `<div style="font-size:11px;opacity:0.7;">↩ ${msg.reply.text}</div>`;
    }

    if (msg.type === "text") {
      html += msg.text;
    }

    if (msg.type === "voice") {
      html += `<audio controls src="${msg.audio}"></audio>`;
    }

    html += `
      <div class="time">${new Date(msg.time).toLocaleTimeString()}</div>
      <div class="ticks">${ticks}</div>
      <button onclick="deleteMsg('${id}')">🗑</button>
      <button onclick="setReply('${msg.text}','${id}')">↩</button>
    `;

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
