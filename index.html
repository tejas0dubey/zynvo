<!DOCTYPE html>
<html>
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5319494706493676"
     crossorigin="anonymous"></script>
  <title>Zynvo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<STYLE>
  body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #fdf6ec, #f7efe2);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* 🔥 HEADER */
header {
  background: rgba(28,28,28,0.9);
  backdrop-filter: blur(10px);
  color: #fff;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  font-weight: 600;
  box-shadow: 0 2px 15px rgba(0,0,0,0.3);
  animation: slideDown 0.4s ease;
}

#online {
  font-size: 13px;
  color: #8cffb0;
}

/* 🔥 CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  scroll-behavior: smooth;
}

/* 🔥 MESSAGE BUBBLE */
.msg {
  max-width: 75%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 16px;
  font-size: 14px;
  position: relative;
  word-wrap: break-word;
  animation: fadeUp 0.25s ease;
  transition: transform 0.2s ease;
}

/* HOVER EFFECT */
.msg:hover {
  transform: scale(1.02);
}

/* SENT */
.me {
  background: linear-gradient(135deg, #dcf8c6, #c7f5b2);
  align-self: flex-end;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* RECEIVED */
.other {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* NAME */
.name {
  font-size: 11px;
  opacity: 0.6;
  margin-bottom: 2px;
}

/* TIME */
.time {
  font-size: 9px;
  opacity: 0.5;
  margin-top: 4px;
}

/* TICKS */
.tick {
  font-size: 11px;
  position: absolute;
  bottom: 5px;
  right: 8px;
  opacity: 0.7;
}

/* IMAGE */
img {
  max-width: 100%;
  border-radius: 12px;
  margin-top: 6px;
  transition: transform 0.3s ease;
}

img:hover {
  transform: scale(1.05);
}

/* PDF BLOCK */
.msg a {
  text-decoration: none;
  font-weight: 500;
}

.msg a:hover {
  text-decoration: underline;
}

/* 🔥 INPUT AREA */
#inputBox {
  display: flex;
  padding: 10px;
  background: rgba(28,28,28,0.95);
  backdrop-filter: blur(10px);
  gap: 8px;
  align-items: center;
  animation: slideUp 0.4s ease;
}

/* INPUT FIELD */
input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  box-shadow: 0 0 0 2px #25d366;
}

/* 🔥 BUTTONS */
button {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #25d366, #1ebe5d);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* HOVER */
button:hover {
  transform: scale(1.1);
}

/* CLICK */
button:active {
  transform: scale(0.9);
}

/* MENU */
#menu {
  position: absolute;
  top: 60px;
  right: 10px;
  background: white;
  padding: 12px;
  border-radius: 12px;
  display: none;
  z-index: 1000;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.2s ease;
}

#menu div {
  padding: 8px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.2s;
}

#menu div:hover {
  background: #f2f2f2;
}

/* 🔥 ANIMATIONS */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(10px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes slideDown {
  from {
    transform: translateY(-30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

/* MOBILE PERFECT */
@media (max-width: 600px) {
  body {
    height: 100dvh;
  }

  header {
    font-size: 16px;
  }

  .msg {
    max-width: 85%;
  }

  button {
    width: 42px;
    height: 42px;
  }
}
</STYLE>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 0 online</div>
  <div onclick="toggleMenu()" style="cursor:pointer;">⋮</div>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickImage()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <!-- ✅ UPDATED -->
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat",
  storageBucket: "anantdhamchat.firebasestorage.app",
  messagingSenderId: "543392456660",
  appId: "1:543392456660:web:c95fcddcd6ee603ea04041"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const onlineDiv = document.getElementById("online");

// USER
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// MENU
window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

window.changeName = () => {
  localStorage.removeItem("username");
  location.reload();
};

// CLEAR CHAT
window.clearChat = async () => {
  const confirmClear = confirm("Clear chat for everyone?");
  if (!confirmClear) return;

  const snapshot = await getDocs(collection(db, "messages"));

  snapshot.forEach(async (docSnap) => {
    await deleteDoc(doc(db, "messages", docSnap.id));
  });
};

// ONLINE SYSTEM
setInterval(()=>{
  setDoc(doc(db,"users",username),{
    name: username,
    lastSeen: Date.now()
  });
},3000);

onSnapshot(collection(db,"users"), snap=>{
  let count = 0;
  snap.forEach(d=>{
    const u = d.data();
    if(Date.now() - u.lastSeen < 5000) count++;
  });
  onlineDiv.innerText = "🟢 " + count + " online";
});

setInterval(async () => {
  await setDoc(doc(db, "users", username), {
    name: username,
    lastSeen: Date.now()
  });
}, 2000);

onSnapshot(collection(db, "users"), snap => {
  let count = 0;
  const now = Date.now();

  snap.forEach(d => {
    const u = d.data();
    if (u.lastSeen && (now - u.lastSeen < 7000)) count++;
  });

  onlineDiv.innerText = "🟢 " + count + " online";
});

// FILE (IMAGE + PDF)
window.pickImage = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async () => {

    if (file.type === "application/pdf") {
      await addDoc(collection(db, "messages"), {
        pdf: reader.result,
        fileName: file.name,
        user: username,
        time: Date.now(),
        seen: false
      });
    } else {
      await addDoc(collection(db, "messages"), {
        image: reader.result,
        user: username,
        time: Date.now(),
        seen: false
      });
    }

  };

  reader.readAsDataURL(file);
};

// TEXT
window.sendMsg = async () => {
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: username,
    time: Date.now(),
    seen: false
  });

  input.value = "";
};

// LOAD
const q = query(collection(db,"messages"), orderBy("time"), limit(50));

onSnapshot(q, snapshot => {
  chat.innerHTML = "";

  snapshot.forEach(async docSnap => {
    const msg = docSnap.data();
    const id = docSnap.id;

    if(msg.user !== username && !msg.seen){
      setDoc(doc(db,"messages",id),{ seen:true }, { merge:true });
    }

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "other");

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.text) html += `<div>${msg.text}</div>`;
    if (msg.image) html += `<img src="${msg.image}">`;

    // ✅ PDF DISPLAY
    if (msg.pdf) {
      html += `
        <div style="margin-top:5px;">
          📄 <a href="${msg.pdf}" target="_blank">
            ${msg.fileName || "Open PDF"}
          </a>
        </div>
      `;
    }

    html += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;

    if(msg.user === username){
      html += `<div class="tick">${msg.seen ? "✔✔" : "✔"}</div>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// ENTER
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
  
</script>

</body>
</html>
