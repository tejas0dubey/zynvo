<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 10px;
      text-align: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      background: white;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    img {
      max-width: 100%;
      margin-top: 5px;
      border-radius: 8px;
    }

    a {
      display: block;
      margin-top: 5px;
      color: blue;
    }

    #inputBox {
      display: flex;
      padding: 8px;
      background: #111;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
    }

    #file {
      display: none;
    }
  </style>
</head>

<body>

<header>Zynvo Chat</header>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickFile()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");

// USER
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// SEND TEXT MESSAGE
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    user: username,
    text: text,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });

  input.value = "";
}

// FILE PICK
function pickFile() {
  fileInput.click();
}

// FILE UPLOAD (IMAGE + PDF)
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async () => {

    const data = {
      user: username,
      time: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (file.type === "application/pdf") {
      data.pdf = reader.result;
      data.fileName = file.name;
    } else {
      data.image = reader.result;
    }

    await db.collection("messages").add(data);
  };

  reader.readAsDataURL(file);
};

// REALTIME CHAT (STABLE - NO RESET BUG)
const rendered = new Set();

db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {

  snapshot.docChanges().forEach(change => {

    const msg = change.doc.data();
    const id = change.doc.id;

    if (change.type === "added") {

      if (rendered.has(id)) return;
      rendered.add(id);

      const div = document.createElement("div");
      div.className = "msg";

      let html = `<b>${msg.user}</b><br>`;

      if (msg.text) html += `${msg.text}<br>`;
      if (msg.image) html += `<img src="${msg.image}">`;

      if (msg.pdf) {
        html += `
          📄 <a href="${msg.pdf}" target="_blank">
            ${msg.fileName || "Open PDF"}
          </a>
        `;
      }

      div.innerHTML = html;
      chat.appendChild(div);
    }
  });

  chat.scrollTop = chat.scrollHeight;
});

// ENTER KEY
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
    </html>
