<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;

  background: linear-gradient(135deg, #1e1e2f, #2c2c54, #1e1e2f);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

header {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: white;
  padding: 15px;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
}

#online {
  color: #00ffcc;
  font-size: 12px;
}

#menu {
  position: absolute;
  top: 60px;
  right: 10px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 12px;
  display: none;
  overflow: hidden;
}

#menu div {
  padding: 12px;
  cursor: pointer;
  color: white;
}

#menu div:hover {
  background: rgba(255,255,255,0.1);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 75%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 18px;
  position: relative;
  color: white;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);

  animation: slideIn 0.3s ease;
}

.me {
  align-self: flex-end;
  background: linear-gradient(135deg, #00ffcc55, #00ffaa33);
}

.other {
  align-self: flex-start;
}

.msg:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 0 20px rgba(0,255,200,0.2);
}

.name {
  font-size: 11px;
  opacity: 0.6;
}

.time {
  font-size: 10px;
  opacity: 0.5;
  text-align: right;
}

.tick {
  position: absolute;
  bottom: 5px;
  right: 8px;
  font-size: 11px;
}

img {
  max-width: 100%;
  border-radius: 12px;
  margin-top: 5px;
}

a {
  color: #00ffcc;
  text-decoration: none;
}

#inputBox {
  display: flex;
  padding: 12px;
  gap: 8px;

  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.4);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;

  background: linear-gradient(135deg, #00ffcc, #00ffaa);
  color: black;
  font-size: 18px;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.15);
  box-shadow: 0 0 15px #00ffcc;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
  </style>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 0 online</div>
  <div onclick="toggleMenu()" style="cursor:pointer;">⋮</div>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickImage()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat",
  storageBucket: "anantdhamchat.firebasestorage.app",
  messagingSenderId: "543392456660",
  appId: "1:543392456660:web:c95fcddcd6ee603ea04041"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const onlineDiv = document.getElementById("online");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// MENU
window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

window.changeName = () => {
  localStorage.removeItem("username");
  location.reload();
};

// CLEAR CHAT
window.clearChat = async () => {
  const confirmClear = confirm("Clear chat for everyone?");
  if (!confirmClear) return;

  const snapshot = await getDocs(collection(db, "messages"));
  snapshot.forEach(async (docSnap) => {
    await deleteDoc(doc(db, "messages", docSnap.id));
  });
};

// ONLINE SYSTEM
setInterval(()=>{
  setDoc(doc(db,"users",username),{
    name: username,
    lastSeen: Date.now()
  });
},2000);

onSnapshot(collection(db,"users"), snap=>{
  let count = 0;
  const now = Date.now();

  snap.forEach(d=>{
    const u = d.data();
    if(u.lastSeen && (now - u.lastSeen < 7000)) count++;
  });

  onlineDiv.innerText = "🟢 " + count + " online";
});

// FILE
window.pickImage = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async () => {
    if (file.type === "application/pdf") {
      await addDoc(collection(db, "messages"), {
        pdf: reader.result,
        fileName: file.name,
        user: username,
        time: Date.now(),
        seen: false
      });
    } else {
      await addDoc(collection(db, "messages"), {
        image: reader.result,
        user: username,
        time: Date.now(),
        seen: false
      });
    }
  };

  reader.readAsDataURL(file);
};

// TEXT
window.sendMsg = async () => {
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    user: username,
    time: Date.now(),
    seen: false
  });

  input.value = "";
};

// LOAD
const q = query(collection(db,"messages"), orderBy("time"), limit(50));

onSnapshot(q, snapshot => {
  chat.innerHTML = "";

  snapshot.forEach(async docSnap => {
    const msg = docSnap.data();
    const id = docSnap.id;

    if(msg.user !== username && !msg.seen){
      setDoc(doc(db,"messages",id),{ seen:true }, { merge:true });
    }

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "other");

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.text) html += `<div>${msg.text}</div>`;
    if (msg.image) html += `<img src="${msg.image}">`;

    if (msg.pdf) {
      html += `<div>📄 <a href="${msg.pdf}" target="_blank">${msg.fileName}</a></div>`;
    }

    html += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;

    if(msg.user === username){
      html += `<div class="tick">${msg.seen ? "✔✔" : "✔"}</div>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// ENTER
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
</html>
