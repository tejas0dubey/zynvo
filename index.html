<!DOCTYPE html>
<html>
<head>
  <title>Zynvo WhatsApp Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .system {
      align-self: center;
      background: #2a3942;
      font-size: 12px;
      opacity: 0.8;
    }

    .nameRow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 3px;
    }

    .pfp {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    .ticks {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 11px;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
      cursor: pointer;
    }

    img, video {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    a {
      color: #53bdeb;
    }

    .reactions {
      margin-top: 5px;
      font-size: 14px;
      display: flex;
      gap: 6px;
      cursor: pointer;
    }

    .reaction-bubble {
      background: #111b21;
      padding: 2px 6px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>Zynvo WhatsApp Clone</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

/* ---------------- USER ---------------- */
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter name:");
  localStorage.setItem("username", username);

  db.collection("messages").add({
    type: "system",
    text: username + " joined the chat",
    time: Date.now()
  });
}

/* ---------------- PROFILE PICTURE ---------------- */
let pfp = localStorage.getItem("pfp");

if (!pfp) {
  const picker = document.createElement("input");
  picker.type = "file";
  picker.accept = "image/*";

  picker.onchange = () => {
    const file = picker.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      pfp = reader.result;
      localStorage.setItem("pfp", pfp);
    };

    reader.readAsDataURL(file);
  };

  picker.click();
}

/* ---------------- SEND MESSAGE ---------------- */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    pfp: pfp || "",
    time: Date.now(),
    reactions: {},
    seenBy: [username]
  });

  input.value = "";
}

/* ---------------- DELETE ---------------- */
window.deleteMsg = (id, msgUser) => {
  if (msgUser !== username) {
    alert("You can only delete your own messages!");
    return;
  }
  db.collection("messages").doc(id).delete();
};

/* ---------------- REACTIONS ---------------- */
window.react = (id, emoji) => {
  const ref = db.collection("messages").doc(id);

  ref.get().then(doc => {
    let data = doc.data();
    let reactions = data.reactions || {};

    reactions[emoji] = (reactions[emoji] || 0) + 1;

    ref.update({ reactions });
  });
};

/* ---------------- LOAD CHAT ---------------- */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();
    const id = doc.id;

    const div = document.createElement("div");

    if (msg.type === "system") {
      div.className = "msg system";
      div.innerText = msg.text;
      chat.appendChild(div);
      return;
    }

    div.className = "msg " + (msg.user === username ? "me" : "");

    let html = `
      <div class="nameRow">
        <img class="pfp" src="${msg.pfp || 'https://i.imgur.com/6VBx3io.png'}">
        <span>${msg.user}</span>
      </div>
    `;

    html += msg.text;

    /* REACTIONS DISPLAY */
    if (msg.reactions) {
      html += `<div class="reactions">`;
      for (let r in msg.reactions) {
        html += `<span class="reaction-bubble">${r} ${msg.reactions[r]}</span>`;
      }
      html += `</div>`;
    }

    html += `
      <div class="time">${new Date(msg.time).toLocaleTimeString()}</div>

      <div class="reactions">
        <span onclick="react('${id}','🔥')">🔥</span>
        <span onclick="react('${id}','❤️')">❤️</span>
        <span onclick="react('${id}','😂')">😂</span>
        <span onclick="react('${id}','👍')">👍</span>
      </div>

      <button onclick="deleteMsg('${id}','${msg.user}')">🗑</button>
    `;

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
