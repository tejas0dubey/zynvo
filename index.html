<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle, #0f2027, #0b141a);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(17,27,33,0.8);
      backdrop-filter: blur(10px);
      padding: 12px;
    }

    .topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 15px;
      background: rgba(32,44,51,0.8);
      animation: fadeUp 0.3s ease;
    }

    .me {
      align-self: flex-end;
      background: linear-gradient(135deg,#00a884,#00796b);
    }

    .system {
      align-self: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .nameRow {
      display: flex;
      gap: 5px;
      font-size: 11px;
    }

    .pfp {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: rgba(17,27,33,0.8);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #2a3942;
      color: white;
    }

    button {
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      background: #00a884;
      color: white;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      opacity: 0.6;
      padding-left: 10px;
    }

    @keyframes fadeUp {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <div class="topBar">
    <div id="status">Personal Chat</div>
    <div onclick="changePfp()">👤</div>
  </div>
</header>

<div id="chat"></div>
<div class="typing" id="typing"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();
const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

/* USER */
let username = localStorage.getItem("username") || prompt("Enter name:");
localStorage.setItem("username", username);

/* ONLINE */
const userId = username + Math.random();
setInterval(()=> {
  db.collection("online").doc(userId).set({time:Date.now(),user:username});
},3000);

db.collection("online").onSnapshot(snap=>{
  let count=0;
  snap.forEach(doc=>{
    if(Date.now()-doc.data().time<5000) count++;
  });
  document.getElementById("status").innerText="Online: "+count;
});

/* TYPING */
input.oninput=()=>{
  db.collection("typing").doc(username).set({time:Date.now()});
};

setInterval(()=>{
  db.collection("typing").doc(username).delete();
},2000);

db.collection("typing").onSnapshot(snap=>{
  let users=[];
  snap.forEach(doc=>{
    if(doc.id!==username) users.push(doc.id);
  });
  document.getElementById("typing").innerText=users.join(", ")+" typing...";
});

/* SEND */
function sendMsg(){
  const text=input.value.trim();
  if(!text)return;

  db.collection("messages").add({
    text,
    user:username,
    time:Date.now()
  });

  aiReply(text);
  input.value="";
}

/* AI */
function aiReply(text){
  let reply="🤖 thinking...";
  if(text.includes("hi")) reply="Hello 👋";
  if(text.includes("how")) reply="I’m good 😄";

  setTimeout(()=>{
    db.collection("messages").add({
      text:reply,
      user:"AI 🤖",
      time:Date.now()
    });
  },1000);
}

/* LOAD */
db.collection("messages").orderBy("time")
.onSnapshot(snap=>{
  chat.innerHTML="";
  snap.forEach(doc=>{
    const msg=doc.data();
    const div=document.createElement("div");
    div.className="msg "+(msg.user===username?"me":"");

    div.innerHTML=`
      <div class="nameRow">
        <span>${msg.user}</span>
      </div>
      ${msg.text}
      <div style="font-size:10px;opacity:0.5;">
        ${new Date(msg.time).toLocaleTimeString()}
      </div>
    `;

    chat.appendChild(div);
  });
  chat.scrollTop=chat.scrollHeight;
});
</script>

</body>
</html>
