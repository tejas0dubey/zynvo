<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>

  <!-- ✅ ICON -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#1c1c1c">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: hsl(35, 17%, 46%);
      color: #fff;
      padding: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 65%;
      padding: 30px;
      margin: 6px 0;
      border-radius: 36px;
    }

    .me { background: hsl(61, 49%, 80%); align-self: flex-end; }
    .other { background: #fff; border:1px solid #ddd; }

    .meta { font-size: 10px; opacity: 0.6; }

    #inputBox {
      display: flex;
      padding: 30px;
      background: #1c1c1c;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 40px;
      border-radius: 80px;
      border: none;
    }

    button {
      margin-left: 8px;
      padding: 40px;
      border-radius: 50%;
      border: none;
      background: hwb(36 69% 0% / 0.722);
      color: white;
      cursor: pointer;
    }

    #menu {
      display:none;
      position:absolute;
      right:10px;
      top:50px;
      background:white;
      color:black;
      padding:10px;
      border-radius:10px;
      z-index:999;
    }

    video { max-width: 200px; border-radius: 10px; }

    #namePopup {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #namePopup div {
      background:white;
      padding:20px;
      border-radius:30px;
    }

    #onlineCount {
      font-size:12px;
      opacity:0.8;
      margin-left:10px;
    }
  </style>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="icon.png" style="width:30px;height:30px;border-radius:8px;">
    <span>Zynvo</span>
    <span id="onlineCount"></span>
  </div>
  <span onclick="toggleMenu()" style="cursor:pointer;">⋮</span>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="namePopup">
  <div>
    <h3>Enter Name</h3>
    <input id="nameInput"><br><br>
    <button onclick="setName()">Join</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="openMenu()">➕</button>
  <input id="msgInput" placeholder="Message..." />
  <input type="file" id="imgInput" style="display:none;">
  <button onclick="sendMsg()">➤</button>
</div>

<video id="camera" autoplay style="display:none;"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ NEW (does NOT affect old logic)
import { getDatabase, ref, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🟢 NEW (independent system)
const rtdb = getDatabase(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const imgInput = document.getElementById("imgInput");
const camera = document.getElementById("camera");

// 🔊 SOUNDS
const sendSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const receiveSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const typingSound = new Audio("https://www.soundjay.com/mechanical/sounds/keyboard-1.mp3");

let room = localStorage.getItem("room") || prompt("Room:");
localStorage.setItem("room", room);

let username = localStorage.getItem("username");
if (username) document.getElementById("namePopup").style.display="none";

// 🟢 ONLINE PRESENCE (SAFE ADD)
const userId = Math.random().toString(36).slice(2);
const userRef = ref(rtdb, "online/" + userId);

set(userRef, { name: username || "anon" });
onDisconnect(userRef).remove();

const onlineRef = ref(rtdb, "online");
onValue(onlineRef, snapshot => {
  const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
  document.getElementById("onlineCount").innerText = "🟢 " + count + " online";
});

window.setName = async ()=>{
  username = document.getElementById("nameInput").value;
  localStorage.setItem("username", username);
  document.getElementById("namePopup").style.display="none";

  await addDoc(collection(db,"messages"),{
    system:true,
    text: username+" joined",
    time:Date.now(),
    room:room
  });
};

// MENU
window.toggleMenu=()=>{
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
}

window.clearChat=()=>{ chat.innerHTML=""; }

window.changeName=()=>{
  localStorage.removeItem("username");
  location.reload();
}

// ➕ MENU
window.openMenu = ()=>{
  const choice = prompt("1 Image\n2 Camera\n3 Voice\n4 Video");

  if(choice=="1") imgInput.click();
  if(choice=="2") startCamera();
  if(choice=="3") recordVoice();
  if(choice=="4") selectVideo();
};

// IMAGE
imgInput.onchange = ()=>{
  const file = imgInput.files[0];
  const reader = new FileReader();
  reader.onload = async ()=>{
    await addDoc(collection(db,"messages"),{
      image:reader.result,
      user:username,
      time:Date.now(),
      room:room,
      expiresAt:Date.now()+3600000
    });
    sendSound.play();
  };
  reader.readAsDataURL(file);
};

// CAMERA
async function startCamera(){
  camera.style.display="block";
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  camera.srcObject = stream;

  setTimeout(async ()=>{
    const canvas = document.createElement("canvas");
    canvas.width = camera.videoWidth;
    canvas.height = camera.videoHeight;
    canvas.getContext("2d").drawImage(camera,0,0);

    const img = canvas.toDataURL();

    await addDoc(collection(db,"messages"),{
      image:img,
      user:username,
      time:Date.now(),
      room:room
    });

    stream.getTracks().forEach(t=>t.stop());
    camera.style.display="none";
    sendSound.play();
  },2000);
}

// VOICE
async function recordVoice(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const recorder = new MediaRecorder(stream);
  let chunks=[];

  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=async ()=>{
    const blob=new Blob(chunks);
    const reader=new FileReader();
    reader.onload=async ()=>{
      await addDoc(collection(db,"messages"),{
        audio:reader.result,
        user:username,
        time:Date.now(),
        room:room
      });
      sendSound.play();
    };
    reader.readAsDataURL(blob);
  };

  recorder.start();
  setTimeout(()=>recorder.stop(),3000);
}

// VIDEO
function selectVideo(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="video/*";
  input.onchange=()=>{
    const file=input.files[0];
    const reader=new FileReader();
    reader.onload=async ()=>{
      await addDoc(collection(db,"messages"),{
        video:reader.result,
        user:username,
        time:Date.now(),
        room:room
      });
      sendSound.play();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// TEXT
window.sendMsg = async ()=>{
  const text=input.value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text,
    user:username,
    time:Date.now(),
    room:room,
    expiresAt:Date.now()+300000
  });

  sendSound.play();
  input.value="";
};

// TYPING SOUND
input.addEventListener("input", ()=>{
  typingSound.currentTime = 0;
  typingSound.play().catch(()=>{});
});

// LOAD
const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
  chat.innerHTML="";

  snap.forEach(doc=>{
    const msg=doc.data();
    if(msg.room!==room) return;
    if(msg.expiresAt && Date.now()>msg.expiresAt) return;

    const div=document.createElement("div");

    if(msg.system){
      div.innerText=msg.text;
      div.style.textAlign="center";
      chat.appendChild(div);
      return;
    }

    div.className="msg "+(msg.user===username?"me":"other");

    // ✔✔ SEEN TICK (UI ONLY)
    let tick = msg.user === username ? " ✔✔" : "";

    let html=`<b>${msg.user}</b><br>${msg.text||""}`;

    if(msg.image) html+=`<br><img src="${msg.image}">`;
    if(msg.audio) html+=`<br><audio controls src="${msg.audio}"></audio>`;
    if(msg.video) html+=`<br><video controls src="${msg.video}"></video>`;

    html+=`<div class="meta">${new Date(msg.time).toLocaleTimeString()}${tick}</div>`;

    div.innerHTML=html;
    chat.appendChild(div);

    if(msg.user !== username) receiveSound.play();
  });

  chat.scrollTop=chat.scrollHeight;
});
</script>

</body>
</html>
