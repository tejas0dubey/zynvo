<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    #statusBar {
      display: flex;
      gap: 6px;
      padding: 8px;
      overflow-x: auto;
      background: #0f1c22;
    }

    .status {
      min-width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #00a884;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .system {
      align-self: center;
      font-size: 12px;
      opacity: 0.7;
      background: #2a3942;
      padding: 6px;
      border-radius: 10px;
    }

    .nameRow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      opacity: 0.8;
    }

    .pfp {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      object-fit: cover;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
    }

    #replyBar {
      display:none;
      padding:6px;
      font-size:12px;
      background:#1f2c34;
    }

    .reactions span {
      margin-right: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Zynvo chat</header>

<div id="statusBar"></div>
<div id="chat"></div>
<div id="replyBar"></div>

<div id="inputBox">
  <button onclick="pickFile()">➕</button>
  <button onclick="startVoice()">🎤</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf,image/*">
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const replyBar = document.getElementById("replyBar");

/* USER */
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter name:");
  localStorage.setItem("username", username);

  db.collection("messages").add({
    type: "system",
    text: username + " joined chat",
    time: Date.now()
  });
}

/* ADMIN */
const admins = ["admin", username]; // first user becomes admin

/* PROFILE */
let pfp = localStorage.getItem("pfp");
if (!pfp) {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  inp.onchange = () => {
    const r = new FileReader();
    r.onload = () => {
      pfp = r.result;
      localStorage.setItem("pfp", pfp);
    };
    r.readAsDataURL(inp.files[0]);
  };
  inp.click();
}

/* REPLY */
let replyTo = null;
window.setReply = (text) => {
  replyTo = text;
  replyBar.style.display = "block";
  replyBar.innerText = "Replying: " + text;
};

/* SEND */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    pfp,
    time: Date.now(),
    reply: replyTo,
    reactions: {},
    seenBy: [username]
  });

  input.value = "";
  replyBar.style.display = "none";
  replyTo = null;
}

/* DELETE */
window.deleteMsg = (id, user) => {
  if (user !== username && !admins.includes(username)) return;
  db.collection("messages").doc(id).delete();
};

/* FILE */
fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    let type = "file";
    if (file.type.startsWith("image")) type = "image";
    if (file.type === "application/pdf") type = "pdf";

    db.collection("messages").add({
      type,
      data: reader.result,
      fileName: file.name,
      user: username,
      pfp,
      time: Date.now()
    });
  };

  reader.readAsDataURL(file);
};

/* VOICE */
function startVoice() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const rec = new MediaRecorder(stream);
    let chunks = [];

    rec.ondataavailable = e => chunks.push(e.data);

    rec.onstop = () => {
      const blob = new Blob(chunks);
      const r = new FileReader();
      r.onload = () => {
        db.collection("messages").add({
          type: "voice",
          audio: r.result,
          user: username,
          pfp,
          time: Date.now()
        });
      };
      r.readAsDataURL(blob);
    };

    rec.start();
    setTimeout(() => rec.stop(), 4000);
  });
}

/* LOAD CHAT */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();
    const id = doc.id;

    const div = document.createElement("div");

    if (msg.type === "system") {
      div.className = "system";
      div.innerText = msg.text;
      chat.appendChild(div);
      return;
    }

    div.className = "msg " + (msg.user === username ? "me" : "");

    let html = `
      <div class="nameRow">
        <img class="pfp" src="${msg.pfp || ''}">
        <span>${msg.user}</span>
      </div>
    `;

    if (msg.reply) html += `<div style="font-size:11px;opacity:0.7;">↩ ${msg.reply}</div>`;
    if (msg.text) html += msg.text;

    if (msg.type === "image") html += `<img src="${msg.data}">`;
    if (msg.type === "pdf") html += `<a href="${msg.data}" target="_blank">${msg.fileName}</a>`;
    if (msg.type === "voice") html += `<audio controls src="${msg.audio}"></audio>`;

    html += `
      <div class="time">${new Date(msg.time).toLocaleTimeString()}</div>
      <button onclick="deleteMsg('${id}','${msg.user}')">🗑</button>
      <button onclick="setReply('${msg.text || "file"}')">↩</button>
    `;

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
  </html>
