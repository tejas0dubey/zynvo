<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    header {
      background: #1c1c1c;
      color: #fff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #online {
      font-size: 12px;
      color: #9cff9c;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .dark .other {
      background: #2a2a2a;
      border-color: #444;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
    }

    .tick {
      font-size: 11px;
      position: absolute;
      bottom: 4px;
      right: 6px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputBox {
      display: flex;
      padding: 8px;
      background: #1c1c1c;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
    }

    #file { display: none; }

    #preview {
      display: none;
      padding: 10px;
    }

    #progressBar {
      height: 4px;
      width: 0%;
      background: #25d366;
    }

    .reactions span {
      margin-right: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 0 online</div>
  <div>
    <button onclick="login()">🔐</button>
    <button onclick="toggleTheme()">🌓</button>
  </div>
</header>

<div id="preview"></div>
<div id="progressBar"></div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickImage()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  limit,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat",
  storageBucket: "anantdhamchat.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const storage = getStorage(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");
const progressBar = document.getElementById("progressBar");
const onlineDiv = document.getElementById("online");

let username = localStorage.getItem("username") || "Guest";


// 🔐 LOGIN
window.login = async () => {
  const result = await signInWithPopup(auth, provider);
  username = result.user.displayName || result.user.email;
  localStorage.setItem("username", username);
};

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    username = user.displayName || user.email;
  }
});

// 🌓 THEME
window.toggleTheme = () => {
  document.body.classList.toggle("dark");
};

// 🟢 ONLINE SYSTEM (UNCHANGED)
setInterval(()=>{
  setDoc(doc(db,"users",username),{
    name: username,
    lastSeen: Date.now()
  });
},2000);

onSnapshot(collection(db,"users"), snap=>{
  let count = 0;
  const now = Date.now();

  snap.forEach(d=>{
    const u = d.data();
    if(u.lastSeen && (now - u.lastSeen < 7000)) count++;
  });

  onlineDiv.innerText = "🟢 " + count + " online";
});

// 📎 FILE PICK
window.pickImage = () => fileInput.click();

// 📎 FILE UPLOAD
fileInput.onchange = async () => {
  const file = fileInput.files[0];

  preview.style.display = "block";

  if (file.type === "application/pdf") {
    preview.innerHTML = "📄 " + file.name;
  } else {
    preview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
  }

  let progress = 0;
  const interval = setInterval(()=>{
    progress += 10;
    progressBar.style.width = progress + "%";
    if(progress >= 100) clearInterval(interval);
  },50);

  const storageRef = ref(storage, "files/" + Date.now() + "_" + file.name);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  if (file.type === "application/pdf") {
    await addDoc(collection(db,"messages"),{
      pdf: url,
      fileName: file.name,
      user: username,
      time: Date.now(),
      seen: false
    });
  } else {
    await addDoc(collection(db,"messages"),{
      image: url,
      user: username,
      time: Date.now(),
      seen: false
    });
  }

  preview.style.display = "none";
  progressBar.style.width = "0%";
};

// 💬 TEXT
window.sendMsg = async () => {
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db,"messages"),{
    text,
    user: username,
    time: Date.now(),
    seen: false
  });

  input.value = "";
};

// 🔄 LOAD MESSAGES
const q = query(collection(db,"messages"), orderBy("time"), limit(50));

onSnapshot(q, snapshot => {
  chat.innerHTML = "";

  snapshot.forEach(async docSnap => {
    const msg = docSnap.data();
    const id = docSnap.id;

    if(msg.user !== username && !msg.seen){
      setDoc(doc(db,"messages",id),{ seen:true }, { merge:true });
    }

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "other");

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.text) html += `<div>${msg.text}</div>`;
    if (msg.image) html += `<img src="${msg.image}">`;

    if (msg.pdf) {
      html += `📄 <a href="${msg.pdf}" target="_blank">${msg.fileName}</a>`;
    }

    html += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;

    html += `
      <div class="reactions">
        <span onclick="react(this)">👍</span>
        <span onclick="react(this)">❤️</span>
        <span onclick="react(this)">😂</span>
      </div>
    `;

    if(msg.user === username){
      html += `<div class="tick">${msg.seen ? "✔✔" : "✔"}</div>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

// ❤️ REACTION
window.react = (el) => {
  el.parentElement.innerHTML = el.innerText;
};

// ENTER
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});

</script>

</body>
  </html>
