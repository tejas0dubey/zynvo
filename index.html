<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1c1c1c;
      color: #fff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      position: relative;
      cursor: default;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .replyBox {
      font-size: 11px;
      background: rgba(0,0,0,0.05);
      padding: 5px;
      border-left: 3px solid #25d366;
      margin-bottom: 5px;
    }

    .tick {
      position: absolute;
      bottom: 5px;
      right: 8px;
      font-size: 11px;
      opacity: 0.6;
    }

    .deleteBtn {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 10px;
      cursor: pointer;
    }

    #replyPreview {
      display: none;
      padding: 6px;
      background: #eee;
      font-size: 12px;
    }

    #inputBox {
      display: flex;
      flex-direction: column;
      background: #1c1c1c;
    }

    #inputRow {
      display: flex;
      padding: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div>🟢 Live</div>
</header>

<div id="chat"></div>

<div id="inputBox">
  <div id="replyPreview"></div>

  <div id="inputRow">
    <button onclick="pickFile()">➕</button>
    <input id="msgInput" placeholder="Message...">
    <button onclick="sendMsg()">➤</button>
  </div>

  <input type="file" id="file" hidden accept="image/*,application/pdf">
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const replyPreview = document.getElementById("replyPreview");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

let replyTo = null;
const seenCache = new Set();

// SEND MESSAGE
function sendMsg() {
  const text = input.value.trim();
  if (!text && !replyTo) return;

  db.collection("messages").add({
    text: text || null,
    user: username,
    time: Date.now(),
    seen: false,
    reply: replyTo || null
  });

  input.value = "";
  replyTo = null;
  replyPreview.style.display = "none";
}

// FILE PICK
function pickFile() {
  fileInput.click();
}

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    let data = {
      user: username,
      time: Date.now(),
      seen: false,
      reply: replyTo || null
    };

    if (file.type === "application/pdf") {
      data.pdf = reader.result;
      data.fileName = file.name;
    } else {
      data.image = reader.result;
    }

    db.collection("messages").add(data);

    replyTo = null;
    replyPreview.style.display = "none";
  };

  reader.readAsDataURL(file);
};

// DELETE MESSAGE
function deleteMsg(id) {
  db.collection("messages").doc(id).delete();
}

// REPLY SET
function setReply(msg) {
  replyTo = {
    text: msg.text || "File",
    user: msg.user
  };

  replyPreview.innerText = `Replying to ${msg.user}: ${replyTo.text}`;
  replyPreview.style.display = "block";
}

// REALTIME LISTENER (FIXED)
db.collection("messages")
.orderBy("time")
.limit(50)
.onSnapshot(snapshot => {

  snapshot.docChanges().forEach(change => {

    const msg = change.doc.data();
    const id = change.doc.id;

    if (change.type === "added") {

      const div = document.createElement("div");
      div.className = "msg " + (msg.user === username ? "me" : "other");

      div.onclick = () => setReply(msg);

      let html = `<b>${msg.user}</b>`;

      if (msg.reply) {
        html += `<div class="replyBox"><b>${msg.reply.user}</b>: ${msg.reply.text}</div>`;
      }

      if (msg.text) html += `<div>${msg.text}</div>`;
      if (msg.image) html += `<img src="${msg.image}" width="150">`;
      if (msg.pdf) html += `<a href="${msg.pdf}" target="_blank">📄 ${msg.fileName}</a>`;

      if (msg.user === username) {
        html += `
          <div class="deleteBtn" onclick="event.stopPropagation(); deleteMsg('${id}')">🗑️</div>
          <div class="tick">${msg.seen ? "✔✔" : "✔"}</div>
        `;
      }

      div.innerHTML = html;
      div.id = id;
      chat.appendChild(div);
    }

    // MARK AS SEEN (SAFE)
    if (msg.user !== username && !msg.seen && !seenCache.has(id)) {
      seenCache.add(id);

      db.collection("messages").doc(id).update({
        seen: true
      });
    }

    if (change.type === "removed") {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

  });

  chat.scrollTop = chat.scrollHeight;
});

// ENTER KEY
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
</html>
