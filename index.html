<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #fdf6ec;
      transition: 0.3s;
    }

    .dark {
      background: #0f172a;
      color: white;
    }

    header {
      background: #1c1c1c;
      color: #fff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #online {
      font-size: 12px;
      color: #00ffcc;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 14px;
      font-size: 14px;
      position: relative;
      animation: fade 0.2s ease;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .dark .other {
      background: #1e293b;
      border-color: #334155;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    .tick {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 11px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 5px;
    }

    a {
      color: #00c3ff;
      text-decoration: none;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      gap: 6px;
      background: #1c1c1c;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #file { display:none; }

    #menu {
      position: absolute;
      top: 55px;
      right: 10px;
      background: white;
      border-radius: 10px;
      display: none;
    }

    #menu div {
      padding: 10px;
      cursor: pointer;
    }

    /* PREVIEW */
    #preview {
      display:none;
      padding:10px;
      background:#00000020;
    }

    #preview img {
      max-width:100px;
      border-radius:8px;
    }

    /* PROGRESS */
    #progressBar {
      height:4px;
      width:0%;
      background:#25d366;
      transition: width 0.2s;
    }

    /* REACTIONS */
    .reactions {
      margin-top:5px;
      display:flex;
      gap:6px;
      font-size:16px;
      cursor:pointer;
    }

    .reactions span:hover {
      transform: scale(1.2);
    }

    @keyframes fade {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 0 online</div>
  <div>
    <span onclick="toggleTheme()">🌓</span>
    <span onclick="toggleMenu()">⋮</span>
  </div>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="preview"></div>
<div id="progressBar"></div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickImage()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");
const progressBar = document.getElementById("progressBar");
const onlineDiv = document.getElementById("online");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

window.toggleTheme = () => document.body.classList.toggle("dark");

window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

window.changeName = () => {
  localStorage.removeItem("username");
  location.reload();
};

window.clearChat = async () => {
  const snapshot = await getDocs(collection(db, "messages"));
  snapshot.forEach(async d => await deleteDoc(doc(db,"messages",d.id)));
};

// ONLINE (unchanged)
setInterval(()=>{
  setDoc(doc(db,"users",username),{name:username,lastSeen:Date.now()});
},2000);

onSnapshot(collection(db,"users"), snap=>{
  let count=0;
  const now=Date.now();
  snap.forEach(d=>{
    if(now - d.data().lastSeen < 7000) count++;
  });
  onlineDiv.innerText="🟢 "+count+" online";
});

// FILE
window.pickImage = () => fileInput.click();

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async () => {

    // preview
    preview.style.display="block";
    preview.innerHTML = file.type==="application/pdf"
      ? `📄 ${file.name}`
      : `<img src="${reader.result}">`;

    // progress animation
    let p=0;
    const i=setInterval(()=>{
      p+=10;
      progressBar.style.width=p+"%";
      if(p>=100) clearInterval(i);
    },40);

    // ORIGINAL LOGIC
    if (file.type === "application/pdf") {
      await addDoc(collection(db,"messages"),{
        pdf:reader.result,fileName:file.name,user:username,time:Date.now(),seen:false
      });
    } else {
      await addDoc(collection(db,"messages"),{
        image:reader.result,user:username,time:Date.now(),seen:false
      });
    }

    preview.style.display="none";
    progressBar.style.width="0%";
  };

  reader.readAsDataURL(file);
};

// TEXT
window.sendMsg = async () => {
  const text=input.value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text,user:username,time:Date.now(),seen:false
  });

  input.value="";
};

// LOAD
const q=query(collection(db,"messages"),orderBy("time"),limit(50));

onSnapshot(q, snap=>{
  chat.innerHTML="";

  snap.forEach(async d=>{
    const msg=d.data();
    const id=d.id;

    if(msg.user!==username && !msg.seen){
      setDoc(doc(db,"messages",id),{seen:true},{merge:true});
    }

    const div=document.createElement("div");
    div.className="msg "+(msg.user===username?"me":"other");

    let html=`<div class="name">${msg.user}</div>`;

    if(msg.text) html+=`<div>${msg.text}</div>`;
    if(msg.image) html+=`<img src="${msg.image}">`;

    if(msg.pdf){
      html+=`📄 <a href="${msg.pdf}" target="_blank">${msg.fileName}</a>`;
    }

    html+=`<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;

    html+=`
      <div class="reactions">
        <span onclick="react(this)">👍</span>
        <span onclick="react(this)">❤️</span>
        <span onclick="react(this)">😂</span>
      </div>
    `;

    if(msg.user===username){
      html+=`<div class="tick">${msg.seen?"✔✔":"✔"}</div>`;
    }

    div.innerHTML=html;
    chat.appendChild(div);
  });

  chat.scrollTop=chat.scrollHeight;
});

window.react = (el)=>{
  el.parentElement.innerHTML = el.innerText;
};

input.addEventListener("keypress", e=>{
  if(e.key==="Enter") sendMsg();
});
</script>

</body>
</html>
