<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
      word-wrap: break-word;
      cursor: pointer;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .system {
      align-self: center;
      background: #2a3942;
      font-size: 12px;
      opacity: 0.8;
    }

    .nameRow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 3px;
    }

    .pfp {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
      margin-top: 4px;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    a {
      color: #53bdeb;
    }

    .replyBox {
      font-size: 11px;
      opacity: 0.7;
      border-left: 2px solid #00a884;
      padding-left: 6px;
      margin-bottom: 5px;
    }

    .deleteBtn {
      font-size: 11px;
      opacity: 0.6;
      cursor: pointer;
      margin-top: 5px;
    }

    .topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .smallBtn {
      font-size: 12px;
      background: #2a3942;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* INTRO + LOGIN */
    #introScreen, #loginScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0b141a;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    #loginScreen { display: none; }

    .bigBtn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #00a884;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      width: 260px;
    }
  </style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
  <h1>Welcome to Zynvo 💬</h1>
  <p style="opacity:0.7;max-width:300px;">
    Real-time chat, file sharing, replies, and more — all in one place.
  </p>
  <button class="bigBtn" onclick="showLogin()">Get Started</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Sign in to continue</h2>
  <button class="bigBtn" onclick="googleLogin()">Continue with Google</button>
</div>

<header>
  <div class="topBar">
    <div>Personal Chat</div>
    <div class="smallBtn" onclick="changePfp()">👤 PFP</div>
  </div>
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="Message...">
  <button onclick="pickFile()">➕</button>
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="fileInput" accept="image/*,application/pdf" hidden>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();
const auth = firebase.auth();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("fileInput");

let username = "";
let pfp = "";

/* INTRO FLOW */
function showLogin() {
  document.getElementById("introScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

/* LOGIN */
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* AUTH */
auth.onAuthStateChanged(user => {
  if (user) {
    username = user.displayName;
    pfp = user.photoURL;

    document.getElementById("introScreen").style.display = "none";
    document.getElementById("loginScreen").style.display = "none";

    db.collection("messages").add({
      type: "system",
      text: username + " joined the chat",
      time: Date.now()
    });
  }
});

/* PROFILE PIC */
function changePfp() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";

  inp.onchange = () => {
    const file = inp.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      pfp = reader.result;
      alert("Profile picture updated!");
    };

    reader.readAsDataURL(file);
  };

  inp.click();
}

/* REPLY */
let replyTo = null;
function setReply(text) { replyTo = text; }

/* SEND */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    pfp: pfp || "",
    time: Date.now(),
    reply: replyTo
  });

  input.value = "";
  replyTo = null;
}

/* DELETE */
window.deleteMsg = (id, user) => {
  if (user !== username) return;
  db.collection("messages").doc(id).delete();
};

/* FILE */
function pickFile() { fileInput.click(); }

fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    let type = "file";
    if (file.type.startsWith("image")) type = "image";
    if (file.type === "application/pdf") type = "pdf";

    db.collection("messages").add({
      type,
      data: reader.result,
      fileName: file.name,
      user: username,
      pfp: pfp || "",
      time: Date.now()
    });
  };

  reader.readAsDataURL(file);
};

/* LOAD CHAT */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();
    const id = doc.id;

    const div = document.createElement("div");

    if (msg.type === "system") {
      div.className = "system";
      div.innerText = msg.text;
      chat.appendChild(div);
      return;
    }

    div.className = "msg " + (msg.user === username ? "me" : "");

    let html = `
      <div class="nameRow">
        <img class="pfp" src="${msg.pfp || 'https://i.imgur.com/6VBx3io.png'}">
        <span>${msg.user}</span>
      </div>
    `;

    if (msg.reply) html += `<div class="replyBox">↩ ${msg.reply}</div>`;
    if (msg.type === "text") html += msg.text;
    if (msg.type === "image") html += `<img src="${msg.data}">`;
    if (msg.type === "pdf") html += `📄 <a href="${msg.data}" target="_blank">${msg.fileName}</a>`;

    html += `
      <div class="time">${new Date(msg.time).toLocaleTimeString()}</div>
      <div class="deleteBtn" onclick="deleteMsg('${id}','${msg.user}')">🗑 Delete</div>
    `;

    div.onclick = () => setReply(msg.text || msg.fileName || "file");

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
