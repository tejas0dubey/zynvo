<!DOCTYPE html>
<html>
<head>
  <title>Zynvo WhatsApp Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .system {
      align-self: center;
      background: #2a3942;
      font-size: 12px;
      opacity: 0.8;
    }

    .nameRow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 3px;
    }

    .pfp {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
      cursor: pointer;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    a {
      color: #53bdeb;
    }
  </style>
</head>

<body>

<header>Zynvo WhatsApp Clone</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="Message...">

  <!-- NEW FILE INPUT -->
  <input type="file" id="fileInput" accept="image/*,application/pdf" hidden>

  <button onclick="pickFile()">➕</button>
  <button onclick="sendMsg()">➤</button>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("fileInput");

/* USER */
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter name:");
  localStorage.setItem("username", username);

  db.collection("messages").add({
    type: "system",
    text: username + " joined the chat",
    time: Date.now()
  });
}

/* PROFILE */
let pfp = localStorage.getItem("pfp");
if (!pfp) {
  const picker = document.createElement("input");
  picker.type = "file";
  picker.accept = "image/*";

  picker.onchange = () => {
    const file = picker.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      pfp = reader.result;
      localStorage.setItem("pfp", pfp);
    };

    reader.readAsDataURL(file);
  };

  picker.click();
}

/* TEXT MESSAGE */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    pfp: pfp || "",
    time: Date.now(),
    reactions: {}
  });

  input.value = "";
}

/* FILE PICK */
function pickFile() {
  fileInput.click();
}

/* FILE UPLOAD (IMAGE + PDF) */
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    let type = "file";

    if (file.type.startsWith("image")) {
      type = "image";
    } else if (file.type === "application/pdf") {
      type = "pdf";
    }

    db.collection("messages").add({
      type,
      data: reader.result,
      fileName: file.name,
      user: username,
      pfp: pfp || "",
      time: Date.now(),
      reactions: {}
    });
  };

  reader.readAsDataURL(file);
};

/* LOAD CHAT */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "");

    if (msg.type === "system") {
      div.className = "msg system";
      div.innerText = msg.text;
      chat.appendChild(div);
      return;
    }

    let html = `
      <div class="nameRow">
        <img class="pfp" src="${msg.pfp || 'https://i.imgur.com/6VBx3io.png'}">
        <span>${msg.user}</span>
      </div>
    `;

    if (msg.type === "text") {
      html += msg.text;
    }

    if (msg.type === "image") {
      html += `<img src="${msg.data}">`;
    }

    if (msg.type === "pdf") {
      html += `
        📄 <a href="${msg.data}" target="_blank">
          ${msg.fileName}
        </a>
      `;
    }

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
  </html>
