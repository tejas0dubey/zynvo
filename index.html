<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#1c1c1c">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: hsl(35, 17%, 46%);
      color: #fff;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 85%;
      padding: 14px 16px;
      margin: 10px 0;
      border-radius: 16px;
      font-size: 18px;
      line-height: 1.5;
      word-break: break-word;
    }

    .me { background: hsl(61, 49%, 80%); align-self: flex-end; }
    .other { background: #fff; border:1px solid #ddd; }

    .meta { font-size: 12px; opacity: 0.6; margin-top: 6px; }

    #inputBox {
      display: flex;
      padding: 16px;
      background: #1c1c1c;
      align-items: center;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      outline: none;
    }

    button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: hwb(36 69% 0% / 0.722);
      color: white;
      cursor: pointer;
      font-size: 20px;
    }

    #menu {
      display:none;
      position:absolute;
      right:10px;
      top:60px;
      background:white;
      color:black;
      padding:14px;
      border-radius:10px;
      z-index:999;
      font-size: 16px;
    }

    video {
      max-width: 260px;
      border-radius: 12px;
      margin-top: 6px;
    }

    img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 6px;
    }

    #namePopup {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 20px;
    }

    #namePopup div {
      background:white;
      padding:26px;
      border-radius:12px;
      width: 100%;
      max-width: 360px;
    }

    #onlineCount {
      font-size:14px;
      opacity:0.8;
      margin-left:10px;
    }

  </style>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="icon.png" style="width:38px;height:38px;border-radius:8px;">
    <span>Zynvo</span>
    <span id="onlineCount"></span>
  </div>
  <span onclick="toggleMenu()" style="cursor:pointer;font-size:24px;">⋮</span>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="namePopup">
  <div>
    <h2>Enter Name</h2>
    <input id="nameInput"><br><br>
    <button onclick="setName()">Join</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="openMenu()">➕</button>
  <input id="msgInput" placeholder="Message..." />
  <input type="file" id="imgInput" style="display:none;">
  <button onclick="sendMsg()">➤</button>
</div>

<video id="camera" autoplay style="display:none;"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getDatabase, ref, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyClBCl...",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rtdb = getDatabase(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const imgInput = document.getElementById("imgInput");
const camera = document.getElementById("camera");

const sendSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

let room = localStorage.getItem("room") || prompt("Room:");
localStorage.setItem("room", room);

let username = localStorage.getItem("username");
if (username) document.getElementById("namePopup").style.display="none";

/* ONLINE */
const userId = Math.random().toString(36).slice(2);
const userRef = ref(rtdb, "online/" + userId);

set(userRef, { name: username || "anon" });
onDisconnect(userRef).remove();

const onlineRef = ref(rtdb, "online");
onValue(onlineRef, snapshot => {
  const val = snapshot.val();
  const count = val ? Object.keys(val).length : 0;
  document.getElementById("onlineCount").innerText = "🟢 " + count + " online";
});

/* NAME */
window.setName = async ()=>{
  username = document.getElementById("nameInput").value;
  localStorage.setItem("username", username);
  document.getElementById("namePopup").style.display="none";

  await addDoc(collection(db,"messages"),{
    system:true,
    text: username+" joined",
    time:Date.now(),
    room:room
  });
};

/* MENU */
window.toggleMenu=()=>{
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
}

window.clearChat=()=>{ chat.innerHTML=""; }

window.changeName=()=>{
  localStorage.removeItem("username");
  location.reload();
}

/* OPEN */
window.openMenu = ()=>{
  const choice = prompt("1 Image\n2 Camera");

  if(choice=="1") imgInput.click();
  if(choice=="2") startCamera();
};

/* IMAGE */
imgInput.onchange = ()=>{
  const file = imgInput.files[0];
  const reader = new FileReader();

  reader.onload = async ()=>{
    await addDoc(collection(db,"messages"),{
      image:reader.result,
      user:username,
      time:Date.now(),
      room:room,
      expiresAt:0
    });
    sendSound.play();
  };

  reader.readAsDataURL(file);
};

/* CAMERA */
async function startCamera(){
  camera.style.display="block";
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  camera.srcObject = stream;

  setTimeout(async ()=>{
    const canvas = document.createElement("canvas");
    canvas.width = camera.videoWidth;
    canvas.height = camera.videoHeight;
    canvas.getContext("2d").drawImage(camera,0,0);

    const img = canvas.toDataURL();

    await addDoc(collection(db,"messages"),{
      image:img,
      user:username,
      time:Date.now(),
      room:room,
      expiresAt:0
    });

    stream.getTracks().forEach(t=>t.stop());
    camera.style.display="none";
    sendSound.play();
  },2000);
}

/* TEXT */
window.sendMsg = async ()=>{
  const text=input.value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text,
    user:username,
    time:Date.now(),
    room:room,
    expiresAt:0
  });

  sendSound.play();
  input.value="";
};

/* 🔥 FIXED SAFE RENDER (NO LOGIC CHANGE) */
const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,snap=>{
  chat.innerHTML="";

  snap.forEach(doc=>{
    const msg=doc.data();
    if(!msg || msg.room!==room) return;

    const div=document.createElement("div");

    if(msg.system){
      div.innerText=msg.text;
      div.style.textAlign="center";
      chat.appendChild(div);
      return;
    }

    div.className="msg "+(msg.user===username?"me":"other");

    let html=`<b>${msg.user || "User"}</b><br>`;

    if(msg.text) html+=msg.text;

    if(msg.image && msg.image.length > 10){
      html+=`<br><img src="${msg.image}">`;
    }

    if(msg.video && msg.video.length > 10){
      html+=`<br><video controls src="${msg.video}"></video>`;
    }

    html+=`<div class="meta">${new Date(msg.time||Date.now()).toLocaleTimeString()}</div>`;

    div.innerHTML=html;
    chat.appendChild(div);
  });

  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight;
  },50);
});
</script>

</body>
</html>
