<!DOCTYPE html>
<html>
<head>
  <title>Zynvo Advanced Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b141a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111b21;
      padding: 12px;
      text-align: center;
      font-weight: 600;
    }

    #online {
      font-size: 12px;
      text-align: center;
      color: #00ffcc;
      padding: 4px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      background: #202c33;
      position: relative;
      word-wrap: break-word;
      animation: pop 0.15s ease;
    }

    .me {
      background: #005c4b;
      align-self: flex-end;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
    }

    .time {
      font-size: 9px;
      opacity: 0.5;
      text-align: right;
    }

    .ticks {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 11px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    a {
      color: #53bdeb;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111b21;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #2a3942;
      color: white;
    }

    button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #00a884;
      color: white;
      cursor: pointer;
    }

    #file { display:none; }

    #emojiBox {
      display:none;
      padding:8px;
      background:#111b21;
      flex-wrap: wrap;
    }

    .emoji {
      margin:4px;
      cursor:pointer;
      font-size:18px;
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<header>Zynvo Chat</header>
<div id="online">🟢 0 online</div>

<div id="chat"></div>

<div id="emojiBox">
😀 😃 😄 😁 😂 😊 ❤️ 🔥 👍 😎
</div>

<div id="inputBox">
  <button onclick="fileInput.click()">➕</button>
  <button onclick="toggleEmoji()">😊</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" accept="image/*,application/pdf">
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
});

const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");
const online = document.getElementById("online");
const emojiBox = document.getElementById("emojiBox");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter name:");
  localStorage.setItem("username", username);
}

/* ONLINE */
setInterval(() => {
  db.collection("users").doc(username).set({
    last: Date.now()
  });
}, 3000);

db.collection("users").onSnapshot(snap => {
  let count = 0;
  const now = Date.now();

  snap.forEach(d => {
    if (now - d.data().last < 8000) count++;
  });

  online.innerText = "🟢 " + count + " online";
});

/* EMOJI */
window.toggleEmoji = () => {
  emojiBox.style.display =
    emojiBox.style.display === "block" ? "none" : "block";
};

emojiBox.onclick = (e) => {
  if (e.target.classList.contains("emoji")) {
    input.value += e.target.innerText;
  }
};

/* SEND */
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    type: "text",
    text,
    user: username,
    time: Date.now(),
    seenBy: [username]
  });

  input.value = "";
}

/* FILE */
fileInput.onchange = () => {
  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    let type = "file";
    if (file.type.startsWith("image")) type = "image";

    db.collection("messages").add({
      type,
      data: reader.result,
      fileName: file.name,
      user: username,
      time: Date.now(),
      seenBy: [username]
    });
  };

  reader.readAsDataURL(file);
};

/* READ + RENDER */
db.collection("messages")
.orderBy("time")
.onSnapshot(snap => {

  chat.innerHTML = "";

  snap.forEach(doc => {
    const msg = doc.data();
    const id = doc.id;

    if (msg.user !== username) {
      db.collection("messages").doc(id).update({
        seenBy: firebase.firestore.FieldValue.arrayUnion(username)
      });
    }

    let ticks = "✔";
    if (msg.seenBy?.length > 1) ticks = "✔✔";

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === username ? "me" : "");

    let html = `<div class="name">${msg.user}</div>`;

    if (msg.type === "text") html += linkify(msg.text);
    if (msg.type === "image") html += `<img src="${msg.data}">`;
    if (msg.type === "file") html += `<a download="${msg.fileName}" href="${msg.data}">📄 ${msg.fileName}</a>`;

    html += `<div class="time">${new Date(msg.time).toLocaleTimeString()}</div>`;
    html += `<div class="ticks">${ticks}</div>`;

    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

/* LINKIFY */
function linkify(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>');
}

input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
</html>
