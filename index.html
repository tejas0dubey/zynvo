<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase (stable) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1c1c1c;
      color: #fff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 80%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      position: relative;
      word-wrap: break-word;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .deleteBtn {
      position: absolute;
      top: 5px;
      right: 5px;
      cursor: pointer;
      font-size: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 5px;
    }

    a {
      display: block;
      margin-top: 5px;
    }

    #inputBox {
      display: flex;
      padding: 8px;
      background: #1c1c1c;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: #25d366;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div>Zynvo</div>
  <div id="online">🟢 Live</div>
</header>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="pickFile()">➕</button>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMsg()">➤</button>
  <input type="file" id="file" hidden accept="image/*,application/pdf">
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const fileInput = document.getElementById("file");

let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// SEND TEXT
function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  db.collection("messages").add({
    text,
    user: username,
    time: Date.now(),
    seen: false
  });

  input.value = "";
}

// FILE PICK
function pickFile() {
  fileInput.click();
}

// FILE SEND
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {

    if (file.type === "application/pdf") {
      db.collection("messages").add({
        pdf: reader.result,
        fileName: file.name,
        user: username,
        time: Date.now(),
        seen: false
      });
    } else {
      db.collection("messages").add({
        image: reader.result,
        user: username,
        time: Date.now(),
        seen: false
      });
    }

  };

  reader.readAsDataURL(file);
};

// DELETE MESSAGE
function deleteMsg(id, user) {
  if (user !== username) return;
  db.collection("messages").doc(id).delete();
}

// REALTIME LOAD (FIXED - no disappearing)
db.collection("messages").orderBy("time").limit(50)
.onSnapshot(snapshot => {

  snapshot.docChanges().forEach(change => {

    if (change.type === "added") {

      const msg = change.doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (msg.user === username ? "me" : "other");

      let html = `<b>${msg.user}</b>`;

      // delete button (only for own msg)
      if (msg.user === username) {
        html += `<div class="deleteBtn" onclick="deleteMsg('${change.doc.id}','${msg.user}')">🗑️</div>`;
      }

      if (msg.text) html += `<div>${msg.text}</div>`;
      if (msg.image) html += `<img src="${msg.image}">`;

      if (msg.pdf) {
        html += `<a href="${msg.pdf}" target="_blank">📄 ${msg.fileName}</a>`;
      }

      div.innerHTML = html;
      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;
    }

    // handle delete sync
    if (change.type === "removed") {
      location.reload();
    }

  });

});

// ENTER SEND
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
  </html>
