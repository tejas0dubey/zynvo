<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    body { margin:0; font-family:Segoe UI; background:#fdf6ec; }

    #login {
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:20px;
      margin-top:100px;
      max-width:300px;
      margin-left:auto;
      margin-right:auto;
    }

    input {
      padding:10px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button {
      padding:10px;
      border:none;
      background:#25d366;
      color:white;
      border-radius:10px;
      cursor:pointer;
    }

    #chatUI { display:none; height:100vh; flex-direction:column; }

    header {
      background:#1c1c1c;
      color:white;
      padding:12px;
    }

    #chat {
      flex:1;
      overflow:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .msg {
      max-width:75%;
      padding:10px;
      margin:5px 0;
      border-radius:10px;
    }

    .me { background:#dcf8c6; align-self:flex-end; }
    .other { background:white; border:1px solid #ddd; }

    #inputBox {
      display:flex;
      padding:10px;
      background:#1c1c1c;
      gap:5px;
    }

    #inputBox input { flex:1; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Phone Login</h3>
  <input id="phone" placeholder="+91XXXXXXXXXX">
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <input id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify</button>
</div>

<!-- CHAT -->
<div id="chatUI">
  <header>Zynvo Chat</header>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="msgInput" placeholder="Message...">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClBExlspVJUUNf3XQuwgh-rN8JHsC4F1w",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const chat = document.getElementById("chat");
const msgInput = document.getElementById("msgInput");

let currentUser = null;
let confirmationResult = null;

// CAPTCHA (required for phone auth)
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
  "recaptcha-container",
  { size: "invisible" }
);

// SEND OTP
window.sendOTP = async () => {
  const phone = document.getElementById("phone").value;

  confirmationResult = await auth.signInWithPhoneNumber(
    phone,
    window.recaptchaVerifier
  );

  alert("OTP sent");
};

// VERIFY OTP
window.verifyOTP = async () => {
  const otp = document.getElementById("otp").value;

  const result = await confirmationResult.confirm(otp);
  currentUser = result.user;

  document.getElementById("login").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  loadChat();
};

// SEND MESSAGE
window.sendMsg = async () => {
  const text = msgInput.value.trim();
  if (!text) return;

  await db.collection("messages").add({
    text,
    uid: currentUser.uid,
    phone: currentUser.phoneNumber,
    time: firebase.firestore.FieldValue.serverTimestamp(),
    seen: false
  });

  msgInput.value = "";
};

// LOAD CHAT (STABLE)
function loadChat() {
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      chat.innerHTML = "";

      snapshot.forEach(docSnap => {
        const msg = docSnap.data();

        const div = document.createElement("div");
        div.className = "msg " +
          (msg.uid === currentUser.uid ? "me" : "other");

        div.innerHTML = `
          <b>${msg.phone}</b><br>
          ${msg.text || ""}
        `;

        chat.appendChild(div);
      });

      chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
      </html>
