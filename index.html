<!DOCTYPE html>
<html>
<head>
  <title>Zynvo</title>

  <!-- ✅ ICON -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#1c1c1c">

  <!-- 📱 MOBILE FIX (ADDED ONLY) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: hsl(35, 17%, 46%);
      color: #fff;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 65%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .me { background: hsl(61, 49%, 80%); align-self: flex-end; }
    .other { background: #fff; border:1px solid #ddd; }

    .meta { font-size: 10px; opacity: 0.6; }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #1c1c1c;
      align-items: center;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 10px;
      border-radius: 50%;
      border: none;
      background: hwb(36 69% 0% / 0.722);
      color: white;
      cursor: pointer;
      min-width: 40px;
      min-height: 40px;
    }

    #menu {
      display:none;
      position:absolute;
      right:10px;
      top:50px;
      background:white;
      color:black;
      padding:10px;
      border-radius:10px;
      z-index:999;
    }

    video {
      max-width: 200px;
      border-radius: 10px;
    }

    #namePopup {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 20px;
    }

    #namePopup div {
      background:white;
      padding:20px;
      border-radius:10px;
      width: 100%;
      max-width: 300px;
    }

    #onlineCount {
      font-size:12px;
      opacity:0.8;
      margin-left:10px;
    }

    /* 📱 MOBILE RESPONSIVE ADDITIONS */
    @media (max-width: 600px) {

      header {
        padding: 10px;
        font-size: 14px;
      }

      #chat {
        padding: 10px;
      }

      .msg {
        max-width: 85%;
        font-size: 14px;
      }

      #inputBox {
        padding: 8px;
      }

      input {
        font-size: 14px;
      }

      button {
        min-width: 38px;
        min-height: 38px;
      }

      video {
        max-width: 160px;
      }
    }

  </style>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="icon.png" style="width:30px;height:30px;border-radius:8px;">
    <span>Zynvo</span>
    <span id="onlineCount"></span>
  </div>
  <span onclick="toggleMenu()" style="cursor:pointer;">⋮</span>
</header>

<div id="menu">
  <div onclick="clearChat()">🗑️ Clear Chat</div>
  <div onclick="changeName()">👤 Change Name</div>
</div>

<div id="namePopup">
  <div>
    <h3>Enter Name</h3>
    <input id="nameInput"><br><br>
    <button onclick="setName()">Join</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="openMenu()">➕</button>
  <input id="msgInput" placeholder="Message..." />
  <input type="file" id="imgInput" style="display:none;">
  <button onclick="sendMsg()">➤</button>
</div>

<video id="camera" autoplay style="display:none;"></video>

<script type="module">

import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getDatabase, ref, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC...",
  authDomain: "anantdhamchat.firebaseapp.com",
  projectId: "anantdhamchat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rtdb = getDatabase(app);

const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");
const imgInput = document.getElementById("imgInput");
const camera = document.getElementById("camera");

/* ---- REST OF YOUR CODE EXACT SAME ---- */
</script>

</body>
</html>
